<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSTAR Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
        }
        
        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
        }
        
        .dashboard { display: none; }
        
        .sidebar {
            width: 260px;
            background: #111;
            position: fixed;
            height: 100%;
            padding: 1.5rem;
            border-right: 1px solid #333;
        }
        
        .sidebar h2 { color: #e50914; margin-bottom: 2rem; }
        .sidebar a { display: block; color: #ccc; padding: 12px; text-decoration: none; border-radius: 8px; margin: 5px 0; }
        .sidebar a:hover, .sidebar a.active { background: #e50914; color: white; }
        
        .main-content {
            margin-left: 260px;
            padding: 2rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
        }
        
        .stat-card h3 { font-size: 2rem; color: #e50914; }
        
        .form-card, .table-card {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
        }
        
        button {
            background: #e50914;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        
        .delete-btn { background: #dc3545; padding: 5px 10px; font-size: 12px; }
        .edit-btn { background: #ffc107; padding: 5px 10px; font-size: 12px; margin-right: 5px; color: #000; }
        
        .config-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .color-preview {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="loginDiv" class="login-container">
        <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="adminLogin()">Login</button>
        <p id="loginError" style="color:#e50914; margin-top:10px;"></p>
    </div>
    
    <div id="adminDashboard" class="dashboard">
        <div class="sidebar">
            <h2>⭐ XSTAR Admin</h2>
            <a href="#" onclick="showSection('dashboard')" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="#" onclick="showSection('movies')"><i class="fas fa-film"></i> Manage Movies</a>
            <a href="#" onclick="showSection('add')"><i class="fas fa-plus"></i> Add Movie</a>
            <a href="#" onclick="showSection('config')"><i class="fas fa-cog"></i> Site Config</a>
            <a href="#" onclick="adminLogout()" style="margin-top: 2rem;"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        
        <div class="main-content">
            <div id="dashboardSection">
                <h1>Admin Dashboard</h1>
                <div class="stats-grid" id="statsGrid"></div>
                <div class="form-card">
                    <h3>Genre Distribution</h3>
                    <canvas id="genreChart" width="400" height="200"></canvas>
                </div>
            </div>
            
            <div id="moviesSection" style="display:none;">
                <h1>Manage Movies</h1>
                <div class="table-card">
                    <div id="moviesTable"></div>
                </div>
            </div>
            
            <div id="addSection" style="display:none;">
                <h1>Add New Movie</h1>
                <div class="form-card">
                    <input type="text" id="title" placeholder="Movie Title">
                    <input type="number" id="year" placeholder="Year">
                    <input type="text" id="imdb_id" placeholder="IMDb ID (e.g., tt4154796)">
                    <select id="language">
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Spanish">Spanish</option>
                        <option value="Japanese">Japanese</option>
                        <option value="Hinglish">Hinglish</option>
                    </select>
                    <input type="text" id="genre" placeholder="Genre (e.g., Action, Drama)">
                    <input type="text" id="image" placeholder="Image URL">
                    <input type="text" id="banner" placeholder="Banner URL">
                    <input type="number" id="rating" step="0.1" placeholder="Rating (0-10)">
                    <textarea id="story" rows="5" placeholder="Movie story..."></textarea>
                    <button onclick="addMovie()"><i class="fas fa-save"></i> Add Movie</button>
                </div>
            </div>
            
            <div id="configSection" style="display:none;">
                <h1>Site Configuration</h1>
                <div class="form-card">
                    <div class="config-section">
                        <div>
                            <label>Site Name</label>
                            <input type="text" id="siteName" placeholder="Site Name">
                        </div>
                        <div>
                            <label>Primary Color</label>
                            <input type="color" id="primaryColor">
                        </div>
                        <div>
                            <label>Background Image URL</label>
                            <input type="text" id="bgImage" placeholder="Background image URL">
                        </div>
                        <div>
                            <label>Animation Enabled</label>
                            <select id="animationEnabled">
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="saveConfig()"><i class="fas fa-save"></i> Save Configuration</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let genreChart = null;
        
        async function adminLogin() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch('/admin/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) });
            if (res.ok) {
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadStats();
                loadMovies();
                loadConfig();
            } else {
                document.getElementById('loginError').innerText = 'Wrong password';
            }
        }
        
        async function loadStats() {
            const res = await fetch('/admin/api/stats');
            const stats = await res.json();
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><h3>${stats.total_movies}</h3><p>Total Movies</p></div>
                <div class="stat-card"><h3>${stats.total_users}</h3><p>Total Users</p></div>
                <div class="stat-card"><h3>${stats.total_watches}</h3><p>Total Views</p></div>
                <div class="stat-card"><h3>${Object.keys(stats.languages).length}</h3><p>Languages</p></div>
            `;
            
            // Genre chart
            const ctx = document.getElementById('genreChart').getContext('2d');
            if (genreChart) genreChart.destroy();
            genreChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(stats.genres).slice(0, 10),
                    datasets: [{ label: 'Number of Movies', data: Object.values(stats.genres).slice(0, 10), backgroundColor: '#e50914' }]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } } }
            });
        }
        
        async function loadMovies() {
            const res = await fetch('/admin/api/movies');
            const movies = await res.json();
            document.getElementById('moviesTable').innerHTML = `
                <table>
                    <thead><tr><th>Title</th><th>Year</th><th>Language</th><th>Genre</th><th>Rating</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${movies.map(m => `
                            <tr>
                                <td>${m.title}</td>
                                <td>${m.year}</td>
                                <td>${m.language}</td>
                                <td>${m.genre}</td>
                                <td>⭐ ${m.rating}</td>
                                <td>
                                    <button class="edit-btn" onclick="editMovie('${m.id}')">Edit</button>
                                    <button class="delete-btn" onclick="deleteMovie('${m.id}')">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        async function addMovie() {
            const movie = {
                title: document.getElementById('title').value,
                year: parseInt(document.getElementById('year').value),
                imdb_id: document.getElementById('imdb_id').value,
                language: document.getElementById('language').value,
                genre: document.getElementById('genre').value,
                image: document.getElementById('image').value,
                banner: document.getElementById('banner').value,
                rating: parseFloat(document.getElementById('rating').value),
                story: document.getElementById('story').value
            };
            await fetch('/admin/api/movies', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(movie) });
            alert('Movie added!');
            loadMovies();
            loadStats();
        }
        
        async function deleteMovie(id) {
            if (confirm('Delete this movie?')) {
                await fetch(`/admin/api/movies/${id}`, { method: 'DELETE' });
                loadMovies();
                loadStats();
            }
        }
        
        async function editMovie(id) {
            // Fetch movie and populate form (simplified)
            alert('Edit feature - fetch movie by ID and populate form');
        }
        
        async function loadConfig() {
            const res = await fetch('/admin/api/config');
            const config = await res.json();
            document.getElementById('siteName').value = config.site_name || '';
            document.getElementById('primaryColor').value = config.primary_color || '#e50914';
            document.getElementById('bgImage').value = config.background_image || '';
            document.getElementById('animationEnabled').value = config.animation_enabled ? 'true' : 'false';
        }
        
        async function saveConfig() {
            const config = {
                site_name: document.getElementById('siteName').value,
                primary_color: document.getElementById('primaryColor').value,
                background_image: document.getElementById('bgImage').value,
                animation_enabled: document.getElementById('animationEnabled').value === 'true'
            };
            await fetch('/admin/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config) });
            alert('Configuration saved!');
        }
        
        function showSection(section) {
            document.getElementById('dashboardSection').style.display = section === 'dashboard' ? 'block' : 'none';
            document.getElementById('moviesSection').style.display = section === 'movies' ? 'block' : 'none';
            document.getElementById('addSection').style.display = section === 'add' ? 'block' : 'none';
            document.getElementById('configSection').style.display = section === 'config' ? 'block' : 'none';
        }
        
        async function adminLogout() {
            await fetch('/admin/api/logout', { method: 'POST' });
            location.reload();
        }
    </script>
</body>
</html>
