<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xstar Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;padding:2rem;}
        .login-container{max-width:400px;margin:100px auto;background:#1a1a1a;padding:2rem;border-radius:12px;}
        input,textarea{width:100%;padding:12px;margin:10px 0;background:#333;border:1px solid #444;border-radius:6px;color:#fff;}
        button{background:#e50914;color:#fff;padding:12px;border:none;border-radius:6px;cursor:pointer;width:100%;}
        .dashboard{display:none;}
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
        .stat-card{background:#1a1a1a;padding:20px;border-radius:10px;text-align:center;}
        .movie-form,.movie-list{background:#1a1a1a;padding:20px;border-radius:10px;margin-bottom:20px;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #333;}
        .delete-btn{background:#dc3545;padding:5px 10px;font-size:12px;width:auto;}
        .nav{display:flex;gap:15px;margin-bottom:20px;}
        .nav button{width:auto;padding:10px 20px;}
    </style>
</head>
<body>
    <div id="loginDiv" class="login-container">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="adminLogin()">Login</button>
        <p id="loginError" style="color:#e50914;margin-top:10px;"></p>
    </div>
    <div id="adminDashboard" class="dashboard">
        <h1>Xstar Admin Dashboard</h1>
        <div class="stats" id="stats"></div>
        <div class="nav"><button onclick="showSection('add')">+ Add Movie</button><button onclick="showSection('list')">Manage Movies</button></div>
        <div id="addSection" class="movie-form">
            <h3>Add New Hindi Dubbed Movie</h3>
            <input type="text" id="title" placeholder="Movie Title">
            <input type="number" id="year" placeholder="Year">
            <input type="text" id="imdb_id" placeholder="IMDb ID (e.g., tt4154796)">
            <input type="text" id="genre" placeholder="Genre">
            <input type="text" id="image" placeholder="Image URL">
            <input type="text" id="banner" placeholder="Banner URL">
            <textarea id="story" rows="5" placeholder="Movie Story (100+ words)"></textarea>
            <button onclick="addMovie()">Add Movie</button>
        </div>
        <div id="listSection" class="movie-list" style="display:none;"><div id="moviesTable"></div></div>
    </div>
    <script>
        async function adminLogin(){
            const pass = document.getElementById('adminPass').value;
            const res = await fetch('/admin/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});
            if(res.ok){ document.getElementById('loginDiv').style.display='none'; document.getElementById('adminDashboard').style.display='block'; loadStats(); loadMovies(); }
            else document.getElementById('loginError').innerText='Wrong password';
        }
        async function loadStats(){
            const res=await fetch('/admin/stats'); const data=await res.json();
            document.getElementById('stats').innerHTML=`<div class="stat-card"><h3>${data.total_movies}</h3><p>Total Movies</p></div><div class="stat-card"><h3>${data.total_users}</h3><p>Users</p></div><div class="stat-card"><h3>${data.total_watches}</h3><p>Views</p></div>`;
        }
        async function loadMovies(){
            const res=await fetch('/admin/api/movies'); const movies=await res.json();
            document.getElementById('moviesTable').innerHTML=`<table><tr><th>Title</th><th>Year</th><th>Genre</th><th>Action</th></tr>${movies.map(m=>`<tr><td>${m.title}</td><td>${m.year}</td><td>${m.genre}</td><td><button class="delete-btn" onclick="deleteMovie('${m.id}')">Delete</button></td></tr>`).join('')}</table>`;
        }
        async function addMovie(){
            const movie={title:document.getElementById('title').value,year:parseInt(document.getElementById('year').value),imdb_id:document.getElementById('imdb_id').value,genre:document.getElementById('genre').value,image:document.getElementById('image').value,banner:document.getElementById('banner').value,story:document.getElementById('story').value};
            await fetch('/admin/api/movies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(movie)});
            alert('Movie added!'); loadMovies();
        }
        async function deleteMovie(id){ if(confirm('Delete?')){ await fetch(`/admin/api/movies/${id}`,{method:'DELETE'}); loadMovies(); loadStats(); } }
        function showSection(section){ document.getElementById('addSection').style.display=section==='add'?'block':'none'; document.getElementById('listSection').style.display=section==='list'?'block':'none'; }
    </script>
</body>
</html>
